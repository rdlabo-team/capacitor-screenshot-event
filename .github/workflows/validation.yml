name: validation
on: [push, pull_request]

jobs:
  test-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm install
      - run: npm run build
      - run: npm install && npm run test:ci
        working-directory: demo
